apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "geoproject-chart.fullname" . }}-app
  labels:
    {{- include "geoproject-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: fastapi
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "geoproject-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fastapi
  template:
    metadata:
      labels:
        {{- include "geoproject-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fastapi
    spec:
      initContainers:
        - name: migrate-db
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          
          workingDir: /home/user/app
          
          env:
            - name: DB_HOST
              value: {{ printf "%s-%s" .Release.Name "postgresql" }}
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: DB_NAME
              value: {{ .Values.postgresql.auth.database }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-%s" .Release.Name "postgresql" }}
                  key: postgres-password
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s:%s/%s" .Values.postgresql.auth.username "$(DB_PASSWORD)" "$(DB_HOST)" "$(DB_PORT)" .Values.postgresql.auth.database | quote }}
            
            - name: ALEMBIC_DB_URL
              value: "$(DATABASE_URL)"

          command: ["/bin/sh", "-c"]
          args:
            - |
              # 1. SHELL-BASED WAIT FOR DATABASE
              echo "Waiting for PostgreSQL at $DB_HOST:$DB_PORT..."
              ATTEMPTS=30
              i=0
              while [ $i -lt $ATTEMPTS ]; do
                # FIX: Use /dev/tcp trick instead of nc, which is not available in slim images.
                if timeout 1 bash -c "cat < /dev/null > /dev/tcp/$DB_HOST/$DB_PORT"; then
                  echo "DB connection successful."
                  break
                fi
                echo "Waiting... ($((i+1))/$ATTEMPTS)"
                sleep 2
                i=$((i+1))
              done
              
              if [ $i -eq $ATTEMPTS ]; then
                  echo "DB connection failed after timeout."
                  exit 1
              fi

              # 2. FIX: Dynamically patch alembic.ini with the DATABASE_URL
              echo "Patching alembic.ini with runtime DATABASE_URL..."
              # IMPORTANT: The 'g' flag ensures all instances of 'sqlalchemy.url = ' are replaced.
              sed -i "s|sqlalchemy.url =|sqlalchemy.url = $(DATABASE_URL)|g" geoproject/alembic/alembic.ini
              
              # 3. RUN MIGRATIONS
              echo "Database is ready. Running Alembic migrations."
              # FIX: Remove the problematic -x flag and rely on the patched file
              /usr/local/bin/poetry run alembic -c geoproject/alembic/alembic.ini upgrade head
              
      containers:
        - name: {{ .Chart.Name }}-app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.service.targetPort }}
          
          workingDir: /home/user/app 
          
          command: ["/usr/local/bin/poetry"]
          args: ["run", "uvicorn", "geoproject.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.app.service.targetPort }}"]

          env:
            - name: DB_HOST
              value: {{ printf "%s-%s" .Release.Name "postgresql" }}
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: DB_NAME
              value: {{ .Values.postgresql.auth.database }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-%s" .Release.Name "postgresql" }}
                  key: postgres-password
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:%s@%s:%s/%s" .Values.postgresql.auth.username "$(DB_PASSWORD)" "$(DB_HOST)" "$(DB_PORT)" .Values.postgresql.auth.database | quote }}

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}