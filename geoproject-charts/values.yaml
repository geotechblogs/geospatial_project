app:
  image:
    repository: ahernandez021985987/geoproject
    tag: "latest"
    pullPolicy: Always
    replicaCount: 1

  service:
    type: NodePort
    port: 80
    targetPort: 8000

postgresql:
  image:
    registry: docker.io
    repository: imresamu/postgis
    tag: "14-3.4"  # Multi-arch image (amd64 + arm64)
    pullPolicy: Always  # Force fresh pull for correct ARM64 architecture

  # Bitnami auth section (chart uses this for secrets, but we also pass
  # explicit env vars below so the non-Bitnami entrypoint picks them up)
  auth:
    database: "geoproject_db"
    username: "geoproject_user"
    password: "password"

  # Mount PVC at /bitnami/postgresql so the chart's auto-set
  # PGDATA=/bitnami/postgresql/data falls within the mounted volume
  persistence:
    mountPath: /bitnami/postgresql

  volumePermissions:
    enabled: false  # Disabled: the bitnami/os-shell init image tag is unavailable; fsGroup handles perms

  primary:
    # Override command: the postgis/postgis image uses the standard PG entrypoint,
    # not Bitnami's /opt/bitnami/scripts/postgresql/entrypoint.sh
    command:
      - "docker-entrypoint.sh"
    args:
      - "postgres"

    podSecurityContext:
      enabled: true
      fsGroup: 999  # 'postgres' user UID in the official image

    containerSecurityContext:
      enabled: true
      runAsUser: 999
      runAsNonRoot: true

    # Override probes — Bitnami's defaults check for /bitnami/postgresql/.initialized
    # which will never exist in the official postgis image
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
      exec:
        command:
          - /bin/sh
          - -c
          - exec pg_isready -U "geoproject_user" -d "dbname=geoproject_db" -h 127.0.0.1 -p 5432

    readinessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
      exec:
        command:
          - /bin/sh
          - -c
          - exec pg_isready -U "geoproject_user" -d "dbname=geoproject_db" -h 127.0.0.1 -p 5432

    # The standard PG entrypoint reads POSTGRES_DB (not POSTGRES_DATABASE which
    # the Bitnami chart sets). We must add it here so the database gets created.
    extraEnvVars:
      - name: POSTGRES_DB
        value: "geoproject_db"
